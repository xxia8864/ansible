---
#- name: Run Backup first
#  import_playbook: backup.yml

- name: Upgrade even device group
  hosts: "even:&nxos"
  serial: 10
  gather_facts: no
  connection: network_cli
  collections:
    - ansible.utils
  tasks:
    - import_tasks: tasks/t_patch_nxos.yml

- name: Upgrade odd device group
  hosts: "odd:&nxos"
  serial: 10
  gather_facts: no
  connection: network_cli
  collections:
    - ansible.utils
  tasks:
    - import_tasks: tasks/t_patch_nxos.yml

