---
- name: Check Internet BGP visibility from RIPEstat
  hosts: localhost
  gather_facts: false

  vars:
    subnet: "203.0.113.0/24"

  tasks:
    - name: Poll RIPEstat Looking Glass API
      ansible.builtin.uri:
        url: "https://stat.ripe.net/data/looking-glass/data.json?resource={{ subnet | urlencode }}&sourceapp=bgp-monitor"
        method: GET
        return_content: true
        status_code: 200
        timeout: 30
      register: ripe_response

    - name: Store RIPEstat JSON output
      ansible.builtin.set_fact:
        api_output: "{{ ripe_response.json }}"

    - name: Show API output for review
      ansible.builtin.debug:
        var: api_output