---
- name: Check Internet BGP visibility from RIPEstat
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Run first-pass BGP visibility check
      ansible.builtin.import_tasks: tasks/t_bgp_check.yml

    - name: Save first-pass BGP alerts
      ansible.builtin.set_fact:
        bgp_alerts_first_pass: "{{ bgp_alerts | default([]) }}"

    - name: Wait 10 minutes before second-pass BGP visibility check
      ansible.builtin.pause:
        seconds: 600
      when:
        - bgp_alerts_first_pass | length > 0

    - name: Run second-pass BGP visibility check
      ansible.builtin.import_tasks: tasks/t_bgp_check.yml
      when:
        - bgp_alerts_first_pass | length > 0

    - name: Send alert email if BGP alerts still exist
      mail:
        host: "{{ alert_smtp_host }}"
        from: "{{ alert_email_from }}"
        to: "{{ alert_email_to }}"
        subject: "[Action Required] {{ site }} Internet BGP visibility issue detected"
        body: |
          The following Internet BGP visibility issues were detected from RIPEstat after two checks 10 minutes apart.

          Site: {{ site }}

          Affected prefixes / ISP circuits:
          {% for alert in bgp_alerts %}
          - {{ alert }}
          {% endfor %}

          Expected upstream visibility:
          - {{ isp1_name }} / Circuit ID: {{ isp1_cid }} / ASN: {{ isp1_as }}
          - {{ isp2_name }} / Circuit ID: {{ isp2_cid }} / ASN: {{ isp2_as }}

          Please open a ticket with the affected ISP circuit and ask the provider to verify BGP advertisement, route policy, and upstream propagation for the listed prefix.
      when:
        - bgp_alerts_first_pass is defined
        - bgp_alerts_first_pass | length > 0
        - bgp_alerts is defined
        - bgp_alerts | length > 0
