---
- name: Check Internet BGP visibility from RIPEstat
  hosts: localhost
  gather_facts: false

  tasks:
    - name: Poll RIPEstat Looking Glass API
      ansible.builtin.uri:
        url: "https://stat.ripe.net/data/looking-glass/data.json?resource={{ item | urlencode }}&sourceapp=bgp-monitor"
        method: GET
        return_content: true
        status_code: 200
        timeout: 30
      loop: "{{ subnet }}"
      register: ripe_response

    - name: Store RIPEstat JSON output
      ansible.builtin.set_fact:
        api_output: "{{ ripe_response.results | map(attribute='json') | list }}"

    - name: Extract all AS paths per subnet
      ansible.builtin.set_fact:
        subnet_as_paths: >-
          {{
            subnet_as_paths | default({})
            | combine({
                item.item: (
                  item.json.data.rrcs
                  | default([])
                  | map(attribute='peers')
                  | flatten
                  | selectattr('as_path', 'defined')
                  | map(attribute='as_path')
                  | map('string')
                  | list
                )
              })
          }}
      loop: "{{ ripe_response.results }}"

    - name: Debug all AS paths per subnet
      ansible.builtin.debug:
        var: subnet_as_paths

    - name: Check ISP1 ASN visibility
      ansible.builtin.set_fact:
        bgp_alerts: "{{ bgp_alerts | default([]) + [ item ~ ' is not visible through ' ~ isp1_name ~ ' circuit ' ~ isp1_cid ~ ' AS' ~ (isp1_as | string) ] }}"
      when: (subnet_as_paths[item] | select('search', '(^| )' ~ (isp1_as | string) ~ '( |$)') | list | length) == 0
      loop: "{{ subnet }}"

    - name: Check ISP2 ASN visibility
      ansible.builtin.set_fact:
        bgp_alerts: "{{ bgp_alerts | default([]) + [ item ~ ' is not visible through ' ~ isp2_name ~ ' circuit ' ~ isp2_cid ~ ' AS' ~ (isp2_as | string) ] }}"
      when: (subnet_as_paths[item] | select('search', '(^| )' ~ (isp2_as | string) ~ '( |$)') | list | length) == 0
      loop: "{{ subnet }}"

    - name: Show BGP alerts
      ansible.builtin.debug:
        var: bgp_alerts

    - name: Send alert email if BGP alerts exist
      mail:
        host: "{{ alert_smtp_host }}"
        from: "{{ alert_email_from }}"
        to: "{{ alert_email_to }}"
        subject: "[Action Required] {{ site }}Internet BGP visibility issue detected"
        body: |
          The following Internet BGP visibility issues were detected from RIPEstat.

          Site: {{ site }}

          Affected prefixes / ISP circuits:
          {% for alert in bgp_alerts %}
          - {{ alert }}
          {% endfor %}

          Expected upstream visibility:
          - {{ isp1_name }} / Circuit ID: {{ isp1_cid }} / ASN: {{ isp1_as }}
          - {{ isp2_name }} / Circuit ID: {{ isp2_cid }} / ASN: {{ isp2_as }}

          Please open a ticket with the affected ISP circuit and ask the provider to verify BGP advertisement, route policy, and upstream propagation for the listed prefix.
      when:
        - bgp_alerts is defined
        - bgp_alerts | length > 0
