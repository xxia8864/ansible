---
- name: Run Backup first
  import_playbook: backup.yml

- name: pre-work
  hosts: localhost
  gather_facts: no
  tasks:
  - name: create fresh log file
    copy:
      content: ""
      dest: "/tmp/tmpfiles/patch_log.txt"
      force: yes
    delegate_to: localhost
  - name: run defined command from Extra variables
    cli_config:
      config: "no system ignore startupconfig switch all"
    register: config_output
    ignore_errors: true

  - name: save config after change
    import_playbook: save_config.yml

- name: Upgrade even devices
  hosts: "even:&ios"
  serial: 10
  gather_facts: no
  connection: network_cli
  tasks:
    - import_tasks: tasks/t_patch_ios.yml

- name: Upgrade odd devices
  hosts: "odd:&ios"
  serial: 10
  gather_facts: no
  connection: network_cli
  tasks:
    - import_tasks: tasks/t_patch_ios.yml

- name: Post patch cleanup
  hosts: "all:!temp"
  serial: 10
  gather_facts: no
  connection: network_cli
  tasks:
    - import_tasks: tasks/t_patch_clean_ios.yml
