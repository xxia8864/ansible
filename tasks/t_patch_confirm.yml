---
- name: Disconnect from device
  meta: reset_connection

- name: Wait until ping fails (device going down)
  shell: "ping -c 1 -W 1 {{ ansible_host }}"
  register: ping_result
  retries: 3
  delay: 3
  until: ping_result.rc != 0
  ignore_errors: yes

- name: Wait until ping succeeds (device back up)
  shell: "ping -c 1 -W 1 {{ ansible_host }}"
  register: ping_result
  retries: 300
  delay: 10
  until: ping_result.rc == 0

- name: Extra wait for TACACS
  pause:
    seconds: 30

#- name: get expected version
#  set_fact:
#    file_version: "{{ firmware_filename | regex_search('(\\d+\\.\\d+\\.\\d+)') }}"
#  run_once: true
#  delegate_to: localhost

- name: get current OS version
  cli_command:
    command: "show version"
  register: version_outputs
  failed_when: firmware_filename not in version_outputs.stdout

- name: interface status check after patch
  cli_command:
    command: "show interface status"
  register: int_status_after

- name: compare interface status
  set_fact:
    int_diff: "{{ int_status_before.stdout_lines | difference(int_status_after.stdout_lines) }}"

- name: append diff to log
  blockinfile:
    path: "/tmp/tmpfiles/patch_log.txt"
    block: |
      {{ ansible_network_hostname }}
      {{ int_diff }}
    insertafter: EOF
    create: yes
  delegate_to: localhost
  when: int_diff | length > 0

- name: set filename for interface status
  set_fact:
    filename: "patch_log.txt"

- import_tasks: tasks/t_upload.yml
  vars:
    ansible_connection: ssh

- name: recheck interface status
  cli_command:
    command: "show interface status"
  register: int_status_recheck
  retries: 3
  delay: 30
  until: >
    int_status_recheck.stdout_lines | 
    difference(int_status_before.stdout_lines) | list | length == 0
  ignore_errors: true

- name: fail if diff still exists
  fail:
    msg: "Interface status changed after upgrade"
  when: >
    int_status_recheck.stdout_lines | 
    difference(int_status_before.stdout_lines) | list | length > 0