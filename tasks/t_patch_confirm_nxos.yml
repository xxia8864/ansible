- name: interface status check after patch
  nxos_command:
    commands:
    - command: show interface status up
      output: json
  register: int_status_after_json

- name: compare interface status
  set_fact:
    int_diff: "{{ int_status_before_json.stdout[0].TABLE_interface.ROW_interface | 
                  difference(int_status_after_json.stdout[0].TABLE_interface.ROW_interface) }}"

                  
- name: debug inter diff
  debug:
    msg: "{{ int_diff }}"

- name: append diff to log
  lineinfile:
    path: "/tmp/tmpfiles/patch_log.txt"
    line: "{{ ansible_network_hostname }} below interface status changed during upgrade"
    insertafter: EOF
    create: yes
  delegate_to: localhost
  when: int_diff | length > 0
  
- name: append changed interfaces to log
  lineinfile:
    path: "/tmp/tmpfiles/patch_log.txt"
    line: "{{ item.interface }}"
  loop: "{{ int_diff }}"
  delegate_to: localhost
  when: int_diff | length > 0

#- name: set filename for interface status
#  set_fact:
#    filename: "patch_log.txt"

#- import_tasks: tasks/t_upload.yml
#  vars:
#    ansible_connection: ssh
#  when: int_diff | length > 0

- name: check again after 60 secconds
  wait_for:
    timeout: 60
  delegate_to: localhost
  when: int_diff | length > 0

- name: recheck interface status
  nxos_command:
    commands:
    - command: show interface status up
      output: json
  register: int_status_recheck_json
  when: int_diff | length > 0

- name: set recheck diff
  set_fact:
    int_diff_recheck: "{{ int_status_before_json.stdout[0].TABLE_interface.ROW_interface | 
                  difference(int_status_recheck_json.stdout[0].TABLE_interface.ROW_interface) }}"
  when: int_diff | length > 0

- name: debug int_diff_recheck
  debug:
    msg: "{{ int_diff_recheck }}"

- name: fail if still different
  fail:
    msg: "Interface diff still exists after 60s: {{ int_diff_recheck }}"
  when:
    - int_diff | length > 0
    - int_diff_recheck | length > 0
