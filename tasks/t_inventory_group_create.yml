- name: Check group exists
  uri:
    url: "{{ host }}/api/v2/groups/?name={{ group_name }}&inventory={{ inventory_id }}"
    method: GET
    headers:
      Authorization: "Bearer {{ oauth_token }}"
      Accept: "application/json"
    validate_certs: no
    return_content: yes
    status_code: 200
  register: grp_check
  run_once: true
  no_log: false

- name: Create group if missing
  uri:
    url: "{{ host }}/api/v2/groups/"
    method: POST
    headers:
      Authorization: "Bearer {{ oauth_token }}"
      Content-Type: "application/json"
      Accept: "application/json"
    validate_certs: no
    body_format: json
    body:
      name: "{{ group_name }}"
      inventory: "{{ inventory_id }}"
    status_code: 201
  run_once: true
  no_log: true
  when: (grp_check.json.count | default(0) | int) == 0