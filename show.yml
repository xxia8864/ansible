---
- name: run cli command (Multiple vendor supports)
  hosts: all
  gather_facts: no
  connection: network_cli

  pre_tasks:
# name: Generate timestamp once
    - import_tasks: tasks/t_time_stamp.yml

    - name: set file name
      set_fact:
        filename: "show_output_{{ timestamp_sec }}.txt"
      delegate_to: localhost
      run_once: true

    - name: create output file locally
      copy:
        content: |
          =================================================
          Network Command Output Report
          Generated: {{ timestamp_day }} - {{ timestamp_sec }}
          Total Hosts: {{ ansible_play_hosts | length }}
          =================================================
        dest: "/tmp/tmpfiles/{{ filename }}"
      run_once: true
      delegate_to: localhost

  tasks:
    - name: run command on Cisco IOS devices
      ios_command:
        commands:
          - "{{ item }}"
      loop: "{{ cli_cmd }}"
      register: cli_outputs
      when: ansible_network_os == 'ios'

    - name: run command on Cisco Nexus devices
      nxos_command:
        commands:
          - "{{ item }}"
      loop: "{{ cli_cmd }}"
      register: cli_outputs
      when: ansible_network_os == 'nxos'

    - name: create host temporary output file
      copy:
        content: |
          IP: {{ inventory_hostname | default([]) }}
          Hostname: {{ ansible_network_hostname }}
          {% for result in cli_outputs.results %}
          ----------------------------------------
          Command {{ loop.index }}: {{ result.item }}
          ----------------------------------------
          {{ result.stdout | join('\n') }}
          {% endfor %}
          =================================================
        dest: "/tmp/tmpfiles/{{ filename }}-{{ ansible_network_hostname }}.txt"
      delegate_to: localhost

    - name: merge host temporary files into final report
      shell: |
        cat /tmp/tmpfiles/{{ filename }}-* >> /tmp/tmpfiles/{{ filename }}
      delegate_to: localhost
      run_once: true

# add SFTP server to inventory
    - import_tasks: tasks/t_sftp.yml
      delegate_to: localhost
      run_once: true

# name: upload backup file to SFTP server
    - import_tasks: tasks/t_upload.yml
      delegate_to: sftp_target
      run_once: true

# No native SFTP in Ansible. Use shell fallback below if needed.
#      shell: |
#        sshpass -p "{{ sftp_password }}" sftp -o StrictHostKeyChecking=no -P {{ sftp_port | default(22) }} {{ sftp_username }}@{{ sftp_host }} <<EOF
#        cd ansible
#        put /tmp/show_output_{{ timestamp_sec }}.txt
#        bye
#        EOF
#      delegate_to: localhost

  post_tasks:
# name: delete tmp file
    - import_tasks: tasks/t_delete_file.yml
      delegate_to: localhost
      run_once: true
      no_log: false

    - import_tasks: tasks/t_delete_file.yml
      vars:
        files_to_delete:
          - "{{ filename }}-{{ ansible_network_hostname }}.txt"
      delegate_to: localhost
      no_log: false
